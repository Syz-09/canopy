<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CANOPY Admin</title>
  <style>
    body {
      margin: 0;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050816;
      color: #f5f5f5;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }
    p {
      margin: 0.25rem 0 1rem;
      color: #c0c4d8;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
      background: #111827;
    }
    th, td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #1f2937;
      vertical-align: top;
    }
    th {
      text-align: left;
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr:hover {
      background: #1f2937;
    }
    code {
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-all;
      color: #e5e7eb;
    }
    button {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #f97373;
      background: transparent;
      color: #fecaca;
    }
    button:hover {
      background: rgba(248, 113, 113, 0.15);
    }
    .login-box {
      max-width: 320px;
      margin: 2rem 0;
      padding: 1.5rem;
      background: #111827;
      border-radius: 8px;
    }
    .login-box input {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 0.75rem;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #0f172a;
      color: #f5f5f5;
    }
    .login-box button[type="submit"] {
      width: 100%;
      padding: 0.5rem;
      border: none;
      background: #16a34a;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    .login-box .err { color: #fecaca; font-size: 0.85rem; margin-bottom: 0.5rem; }
    #loginSection { display: none; }
    #loginSection.show { display: block; }
    #dataSection { display: none; }
    #dataSection.show { display: block; }
  </style>
</head>
<body>
  <h1>CANOPY Admin</h1>

  <div id="loginSection" class="login-box show">
    <p style="margin-top:0;">请登录后查看提交数据。</p>
    <p class="err" id="loginErr"></p>
    <form id="loginForm">
      <input type="text" name="user" placeholder="Username" required />
      <input type="password" name="pass" placeholder="Password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>

  <div id="dataSection">
  <p>查看和管理所有 Submit / Feature / Contributor 提交。</p>

  <table id="tbl">
    <thead>
      <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Name</th>
        <th>Email</th>
        <th>Created</th>
        <th>Details</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  </div>

  <script>
    var loginSection = document.getElementById('loginSection');
    var dataSection = document.getElementById('dataSection');

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var form = e.target;
      var user = form.user.value.trim();
      var pass = form.pass.value;
      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: user, pass: pass }),
        credentials: 'include'
      }).then(function (r) { return r.json(); }).then(function (data) {
        if (data.ok) {
          loginSection.classList.remove('show');
          dataSection.classList.add('show');
          load();
        } else {
          document.getElementById('loginErr').textContent = 'Username or password incorrect.';
        }
      }).catch(function () {
        document.getElementById('loginErr').textContent = 'Network error.';
      });
    });

    function load() {
      fetch('/api/admin/submissions', { credentials: 'include' })
        .then(function (res) {
          if (res.status === 401) {
            loginSection.classList.add('show');
            dataSection.classList.remove('show');
            return { ok: false };
          }
          return res.json();
        })
        .then(function (data) {
          if (!data.ok || !data.items) return;
          dataSection.classList.add('show');
          loginSection.classList.remove('show');
          var tbody = document.querySelector('#tbl tbody');
          tbody.innerHTML = '';
          data.items.forEach(function (item) {
            var payload = {};
            try {
              payload = JSON.parse(item.payload || '{}');
            } catch (e) {
              payload = {};
            }

            var detailsHtml = '';
            if (item.form_type === 'project') {
              detailsHtml =
                '<div><strong>Affiliation:</strong> ' + (payload.affiliation || '') + '</div>' +
                '<div><strong>Title:</strong> ' + (payload.project_title || '') + '</div>' +
                '<div><strong>Description:</strong> ' + (payload.description || '') + '</div>' +
                '<div><strong>Privacy:</strong> ' + (payload.privacy || '') + '</div>';
            } else if (item.form_type === 'feature') {
              detailsHtml =
                '<div><strong>Who/what:</strong> ' + (payload.who || '') + '</div>' +
                '<div><strong>Why:</strong> ' + (payload.why || '') + '</div>' +
                '<div><strong>Link:</strong> ' + (payload.link || '') + '</div>';
            } else if (item.form_type === 'contributor') {
              var roles = payload.role;
              if (Array.isArray(roles)) {
                roles = roles.join(', ');
              }
              detailsHtml =
                '<div><strong>Affiliation:</strong> ' + (payload.affiliation || '') + '</div>' +
                '<div><strong>Roles:</strong> ' + (roles || '') + '</div>' +
                '<div><strong>Note:</strong> ' + (payload.note || '') + '</div>' +
                '<div><strong>Samples:</strong> ' + (payload.samples || '') + '</div>';
            } else {
              detailsHtml = '<code>' + (item.payload || '') + '</code>';
            }

            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + item.id + '</td>' +
              '<td>' + item.form_type + '</td>' +
              '<td>' + (item.name || '') + '</td>' +
              '<td>' + (item.email || '') + '</td>' +
              '<td>' + item.created_at + '</td>' +
              '<td>' + detailsHtml + '</td>' +
              '<td><button data-id=\"' + item.id + '\">Delete</button></td>';
            tbody.appendChild(tr);
          });

          tbody.querySelectorAll('button[data-id]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var id = btn.getAttribute('data-id');
              if (!confirm('确定删除 #' + id + ' ?')) return;
              fetch('/api/admin/submissions?id=' + encodeURIComponent(id), { method: 'DELETE', credentials: 'include' })
                .then(function () { load(); });
            });
          });
        });
    }

    load();
  </script>
</body>
</html>
